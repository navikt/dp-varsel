name: Test Dependabot PRs

on:
  push:
    branches:
      - 'dependabot/**'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/gradle-build-action@v3.5.0
        with:
          arguments: --configuration-cache test